<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LWD Rummy</title>
  <style>
    /* Push game content left so boardgame.io debug panel never overlays */
    body:has(.debug-panel) #root { margin-right: 300px; }
    /* Pulsing glow for draw piles when player needs to draw */
    @keyframes draw-pulse {
      0%, 100% { box-shadow: 0 0 4px rgba(39,174,96,0.3); }
      50% { box-shadow: 0 0 12px rgba(39,174,96,0.7); }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
